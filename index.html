<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NURO＋携帯シミュレーター</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0086ff">

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body { font-family: sans-serif; padding:20px; background:#f5f5f7; }
.card { background:#fff; padding:20px; border-radius:12px; margin-bottom:15px; }
select,input { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc; }
button { width:100%; padding:12px; background:#0086ff; color:#fff; border:none; border-radius:10px; font-weight:bold; }
.result { font-size:20px; font-weight:bold; margin-top:10px; }
.recommend { margin-top:10px; padding:10px; background:#fff3e0; border-radius:8px; }
</style>

</head>
<body>

<h2>NURO＋携帯 総合シミュレーター</h2>

<div class="card">

<label>光回線</label>
<select id="net">
<option value="5720">ドコモ光</option>
<option value="5720">ソフトバンク光</option>
<option value="5610">auひかり</option>
<option value="5478">BIGLOBE光</option>
<option value="6380">10Gプラン</option>
</select>

<label>携帯キャリア</label>
<select id="carrier">
<option value="docomo">ドコモ</option>
<option value="au">au</option>
<option value="softbank">ソフトバンク</option>
<option value="rakuten">楽天</option>
<option value="ymobile">ワイモバイル</option>
<option value="uq">UQモバイル</option>
<option value="corp">法人プラン</option>
</select>

<label>データ容量</label>
<select id="plan">
<option value="small">小容量</option>
<option value="medium">中容量</option>
<option value="large">大容量</option>
<option value="unlimited">無制限</option>
</select>

<label>台数</label>
<input type="number" id="count" value="3" min="1" max="50">

<label>
<input type="checkbox" id="setwari"> 自宅セット割を適用
</label>

<button onclick="calc()">計算する</button>

<div class="result" id="result"></div>
<div class="recommend" id="recommend"></div>

</div>

<script>

// ■ 携帯料金
const mobileFee = {
docomo:{small:4565,medium:2970,unlimited:7315},
au:{small:4500,medium:3000,unlimited:7458},
softbank:{small:4500,medium:2728,unlimited:7425},
rakuten:{small:1078,medium:2178,unlimited:3278},
ymobile:{small:2178,medium:3278,large:4158},
uq:{small:1628,medium:2728,large:3828},
corp:{small:3480,medium:3980,large:4480,unlimited:5480}
};

// ■ セット割
const setwari = {
docomo:1100,
au:1100,
softbank:1100,
rakuten:1000,
corp:1100,
ymobile:{small:1100,medium:1650,large:1650},
uq:{small:1100,medium:1100,large:1100}
};

function getDiscount(carrier,plan){
const d = setwari[carrier];
if(typeof d === "object") return d[plan] || 0;
return d || 0;
}

function calc(){

const net = Number(document.getElementById("net").value);
const carrier = document.getElementById("carrier").value;
const plan = document.getElementById("plan").value;
const count = Number(document.getElementById("count").value);
const useSetwari = document.getElementById("setwari").checked;

let mobile = mobileFee[carrier][plan] || 0;
let totalMobile = mobile * count;

let discount = useSetwari ? getDiscount(carrier,plan) * count : 0;

let total = net + totalMobile - discount;

// 結果
document.getElementById("result").innerHTML =
"月額：" + total.toLocaleString() + "円<br>" +
"年間：" + (total*12).toLocaleString() + "円<br>" +
"3年：" + (total*36).toLocaleString() + "円";

// おすすめ
let rec = "";
if(count >= 3){
rec = "法人プランがおすすめ（コストと管理のバランス◎）";
}else if(carrier === "rakuten"){
rec = "現状でもかなり安い構成です";
}else{
rec = "格安SIMまたは法人プランに切り替えると削減できます";
}

document.getElementById("recommend").innerText = rec;

}

// Service Worker
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>

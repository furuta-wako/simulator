<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NURO＋携帯シミュレーター</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b63ce">
<link rel="apple-touch-icon" href="icon.png">

<style>
body{font-family:sans-serif;background:#f3f6fb;margin:0;padding:20px}
h1{margin-bottom:20px}
.card{background:#fff;padding:20px;border-radius:16px;margin-bottom:16px}
select,input{width:100%;padding:10px;border-radius:10px;border:1px solid #ccc}
button{padding:12px;border:none;border-radius:10px;font-weight:bold;cursor:pointer}
.calc{background:#0b63ce;color:#fff}
.clear{background:#ccc}
.result{font-size:22px;font-weight:bold;margin-top:10px}
</style>
</head>

<body>

<h1>NURO＋携帯 総合シミュレーター</h1>

<div class="card">

<h3>光回線</h3>
<select id="net">
<option value="5720">ドコモ光 1G 戸建てA</option>
<option value="5940">ドコモ光 1G 戸建てB</option>
<option value="4400">ドコモ光 マンションA</option>
<option value="4620">ドコモ光 マンションB</option>
<option value="5720">ソフトバンク光 戸建て</option>
<option value="4180">ソフトバンク光 マンション</option>
<option value="6380">10G共通</option>
<option value="5478">BIGLOBE光 1G</option>
<option value="6270">BIGLOBE光 10G</option>
</select>

<h3>現在の携帯プラン</h3>
<select id="mobile">
<option value="7315">ドコモ eximo</option>
<option value="2970">ahamo</option>
<option value="7458">au 使い放題MAX</option>
<option value="7425">ソフトバンク メリハリ</option>
<option value="3278">楽天 無制限</option>
<option value="4015">ワイモバ L</option>
<option value="3278">UQ トクトク</option>
</select>

<h3>乗り換え後携帯</h3>
<select id="afterMobile">
<option value="5480">法人 無制限</option>
<option value="4480">法人 50GB</option>
<option value="3980">法人 20GB</option>
<option value="3480">法人 5GB</option>
<option value="4015">ワイモバ L</option>
<option value="3278">UQ</option>
<option value="3278">楽天</option>
</select>

<h3>NURO</h3>
<select id="nuro">
<option value="3980">NURO 2G 3年</option>
<option value="5500">NURO 2G 通常</option>
</select>

<h3>台数</h3>
<input type="number" id="count" value="3">

<br><br>

<label>
<input type="checkbox" id="setwari">
自宅セット割（1100円）
</label>

<br><br>

<button class="calc" onclick="calc()">計算</button>
<button class="clear" onclick="clearAll()">クリア</button>

</div>

<div class="card">
<div class="result" id="result">月額：---</div>
<div class="result" id="year">年間：---</div>
<div class="result" id="three">3年：---</div>
</div>

<script>

function calc(){
const net = Number(netSelect.value);
const mobile = Number(mobileSelect.value);
const afterMobile = Number(afterMobileSelect.value);
const nuro = Number(nuroSelect.value);
const count = Number(countInput.value);

const setwari = setwariCheck.checked ? 1100 * count : 0;

const current = net + (mobile * count);
const after = nuro + (afterMobile * count) - setwari;

const diff = current - after;

result.innerText = "月額：" + after.toLocaleString() + "円";
year.innerText = "年間：" + (diff*12).toLocaleString() + "円差";
three.innerText = "3年：" + (diff*36).toLocaleString() + "円差";
}

function clearAll(){
netSelect.selectedIndex = 0;
mobileSelect.selectedIndex = 0;
afterMobileSelect.selectedIndex = 0;
nuroSelect.selectedIndex = 0;
countInput.value = 1;
setwariCheck.checked = false;

result.innerText = "月額：---";
year.innerText = "年間：---";
three.innerText = "3年：---";
}

const netSelect = document.getElementById("net");
const mobileSelect = document.getElementById("mobile");
const afterMobileSelect = document.getElementById("afterMobile");
const nuroSelect = document.getElementById("nuro");
const countInput = document.getElementById("count");
const setwariCheck = document.getElementById("setwari");

</script>

</body>
</html>
